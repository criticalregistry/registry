# ── CORRECTION 3: libxslt ────────────────────────────────────────────────────
# Change: related_entries added (Chavero maintains both; libxslt depends on libxml2)
- name: "libxslt"
  related_entries:                              # NEW
    - libxml2
  notes: >
    Nick Wellnhofer stepped down as libxslt maintainer March 2025. Project declared
    unmaintained July 2025. Iván Chavero took over as sole maintainer August 2025.
    Chavero explicitly acknowledged needing to get up to speed on XSLT and the codebase.
    COMPOUNDED RISK: Chavero is also the new primary maintainer of libxml2 (December 2025).
    libxslt depends on libxml2. A single person now holds both projects simultaneously.
    This is the highest-density single-point-of-failure discovered in the seed list:
    one person, two interdependent libraries, both recently transitioned from long-tenured
    experts, no employer-backed funding for either project. Both projects also depend on
    the same underlying libxml2 codebase health.

