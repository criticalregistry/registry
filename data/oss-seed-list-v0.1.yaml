# Critical Software Risk Register — MVP Seed List v0.1
# Generated: April 26, 2026
# Methodology: web-search verified against project repos, maintainer statements,
#              CISA ICS-CERT advisories, and CVE/NVD data.
#              Fields marked `unknown` could not be confirmed from public sources.
# OT confirmation requires: public SBOM appearance, CISA/ICS-CERT advisory reference,
#              CVE affecting an OT product, or documented vendor disclosure.

