# Post-YAML Notes
#
# Considered and excluded:
#
# - ncurses C++ bindings (ncursesw): dependent on ncurses maintainer, not separately tracked
# - BIND9: ISC has commercial support model (ISC Kea) that provides structural sustainability
#   beyond this registry's threshold; excluded
# - chrony: Red Hat/IBM backed as default NTP; too well-resourced
# - SQLite: exemplary counter-case (well-run, small team, structured governance); excluded as
#   positive example cited in methodology rather than at-risk entry
# - Mosquitto (MQTT broker): now development-driven by Cedalo GmbH (commercial backer);
#   qualifies as commercial_sponsor and excluded on that basis
# - OpenBSD libressl: OpenBSD Foundation backed, distributed team; excluded
# - BusyBox: primarily maintained by Denys Vlasenko; borderline but C codebase;
#   excluded pending maintainer data verification (no confirmed OT source found)
#
# Systemic data gaps across this list:
# - Maintainer employer data is unavailable or unverified for ~40% of entries.
#   Several maintainers use pseudonyms (D.R. Commander) or do not publicly document
#   their employment in contexts relevant to their OSS work.
# - Funding horizon: almost no entries have publicly documented funding secured beyond
#   12 months; most have zero documented funding.
# - OT presence for IT-facing libraries (libxslt, PCRE2, libgpg-error): confirmed
#   indirectly through ecosystem dependency but specific OT SBOM documentation is
#   either proprietary or not yet mandated under CRA/FDA timelines.
#
# Low-confidence entries:
# - libxml2 (#4): new maintainer identities and employer affiliations unverified.
#   Field data will require direct contact before publication.
# - libjpeg-turbo (#10): D.R. Commander's real identity and employer not publicly documented.
#   The registry's named-maintainer model requires resolution before publication.
# - PCRE2 (#19): active committer count estimated; Herczeg's full-time commitment to PCRE2
#   vs other projects not confirmed.
